<!-- templates/index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatly – Real-time Chatbot</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">Chatly</div>
      <p class="subtitle">Real-time assistant</p>
      <div class="instructions">
        <strong>Try:</strong> "hi", "tell me a joke", "how are you?"
      </div>
    </aside>

    <main class="chat-area">
      <div id="chat-window" class="chat-window">
        <!-- messages injected here -->
      </div>

      <form id="chat-form" class="chat-form" onsubmit="return false;">
        <input id="msg" class="input" type="text" placeholder="Type a message..." />
        <button id="sendBtn" class="send">Send</button>
      </form>
    </main>
  </div>

  <script src="/static/main.js"></script>
</body>
</html>
